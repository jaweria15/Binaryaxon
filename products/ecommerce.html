<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Solutions | Binary Axon</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:wght@300;400;700&swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <style>
        body { background-color: #050505; color: white; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .accent-gradient { background: linear-gradient(135deg, #635091, #FFC132); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; }
        .screenshot-grid img { cursor: pointer; transition: transform 0.3s ease; }
        .screenshot-grid img:hover { transform: scale(1.05); }
        .nav-logo-img { height: 2rem !important; width: auto !important; }
    </style>
</head>
<body x-data="{ activeImg: '../assets/images/products/ecommerce-1.webp', showDemoModal: false, demoProductName: 'E-Commerce Solutions', submitting: false, success: false, showLightbox: false, lightboxImg: '' }">

    <div id="shared-header"></div>

    <main class="min-h-screen py-32 flex flex-col justify-start">
        <div id="shared-product-hero" data-product-id="ecommerce"></div>
        
        <!-- Individual pages can add custom content sections here -->
    </main>

    <div id="shared-footer-and-modals"></div>

    <script src="../assets/js/products-data.js"></script>
    <script src="../assets/js/product-layout.js"></script>
    <script src="../assets/js/demo-modal.js"></script>
</body>
</html>
