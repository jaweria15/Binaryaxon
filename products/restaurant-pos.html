<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant POS | Binary Axon</title>
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600;700&family=Inter:wght@300;400;700&swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: white; overflow-x: hidden; }
        .glass-panel { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 2rem; }
        .accent-gradient { background: linear-gradient(135deg, #FFC132, #635091); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-50 p-6">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <a href="../index.html" class="flex items-center gap-2 group">
                <div class="w-10 h-10 bg-white/5 rounded-xl border border-white/10 flex items-center justify-center group-hover:bg-[#635091] transition-all">
                    <i class="fas fa-arrow-left text-white"></i>
                </div>
                <span class="text-sm font-bold tracking-widest uppercase">Back to Home</span>
            </a>
            <img src="../assets/images/Binary_Axon_logo_2307.png" alt="Binary Axon" class="h-8 opacity-80">
        </div>
    </header>

    <main class="min-h-screen flex items-center py-32">
        <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            <div>
                <span class="text-[#FFC132] font-mono tracking-[0.3em] uppercase text-xs mb-4 block">HOSPITALITY SOLUTION</span>
                <h1 class="text-6xl font-bold tracking-tighter mb-6 leading-tight">
                    Restaurant <br><span class="accent-gradient">POS System</span>
                </h1>
                <p class="text-xl text-gray-400 mb-10 leading-relaxed max-w-xl">
                    Synchronized kitchen and floor management for modern dining. Our Restaurant POS automates order taking, kitchen workflow, and billing, reducing wait times and increasing table turnover by 40%.
                </p>
                <div class="grid grid-cols-2 gap-8 mb-12">
                    <div class="p-6 glass-panel border-l-4 border-l-[#FFC132]">
                        <h3 class="text-3xl font-bold mb-1">500+</h3>
                        <p class="text-xs text-gray-500 uppercase tracking-widest">Active Restaurants</p>
                    </div>
                </div>
                <div class="flex gap-4">
                    <button class="px-10 py-4 bg-[#FFC132] text-black font-bold rounded-full hover:scale-105 transition-transform">DEMO SESSION</button>
                    <button class="px-10 py-4 bg-white/5 border border-white/10 rounded-full hover:bg-white/10 transition-all font-bold">PRICING</button>
                </div>
            </div>
            <div class="glass-panel p-4 overflow-hidden relative">
                <img src="https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?w=800" class="rounded-[1.5rem] w-full" alt="Commerce Preview">
            </div>
        </div>
    </main>

</body>
</html>
